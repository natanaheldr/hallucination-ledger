<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — Hallucination Ledger</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <nav class="navbar">
            <div class="nav-inner">
                <a href="/" class="nav-brand">
                    <span class="brand-icon">&#9670;</span>
                    <span class="brand-text">Hallucination<span class="brand-accent">Ledger</span></span>
                </a>
                <div class="nav-links">
                    <a href="/" class="nav-link">Dashboard</a>
                    <a href="/add" class="nav-link nav-link-accent">+ Analyze Response</a>
                    <button class="btn btn-ghost btn-sm" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme" style="font-size:1.1rem;">&#x1F319;</button>
                </div>
            </div>
        </nav>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
        <footer class="footer">
            <span>Day 002 &mdash; AI Safety</span>
            <span class="footer-dot">&middot;</span>
            <span>Open Source</span>
            <span class="footer-dot">&middot;</span>
            <span data-tooltip="F=Search, N=New analysis, Arrows=Navigate, Ctrl+E=CSV, Ctrl+J=JSON">Shortcuts</span>
        </footer>
    </div>
    <div id="toast-container"></div>
    <script>
        const API_BASE = '/api';

        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
            updateThemeIcon();
        })();

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const btn = document.getElementById('theme-toggle');
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            if (btn) btn.innerHTML = isLight ? '&#x2600;' : '&#x1F319;';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function showToast(message, type = '') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2800);
        }

        function formatDate(iso) {
            return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
