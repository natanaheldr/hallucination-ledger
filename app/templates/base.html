<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallucination Ledger — {% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <nav class="navbar">
            <div class="nav-inner">
                <a href="/" class="nav-brand">
                    <span class="brand-icon">&#9670;</span>
                    <span class="brand-text">Hallucination<span class="brand-accent">Ledger</span></span>
                </a>
                <div class="nav-links">
                    <a href="/" class="nav-link">Dashboard</a>
                    <a href="/add" class="nav-link nav-link-accent">+ New Response</a>
                </div>
            </div>
        </nav>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
        <footer class="footer">
            <span>Day 002 — AI Safety Toolkit</span>
            <span class="footer-dot">·</span>
            <span>v0.1.0</span>
        </footer>
    </div>
    <script>
        const API_BASE = '/api';
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
