{% extends "base.html" %}
{% block title %}Claim #{{ claim_id }}{% endblock %}
{% block content %}
<div class="detail-container" id="detail-container">
    <div class="page-header">
        <h1 class="page-title">Claim #{{ claim_id }}</h1>
        <a href="/" class="btn btn-ghost">&larr; Back to Dashboard</a>
    </div>
    <div id="claim-detail">Loading...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const claimId = {{ claim_id }};

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function statusBadge(status) {
    const map = { verified: 'green', doubtful: 'yellow', false: 'red', unreviewed: 'gray' };
    return `<span class="badge badge-${map[status] || 'gray'}">${status}</span>`;
}

async function loadDetail() {
    try {
        const res = await fetch(`${API_BASE}/claims?page=1&per_page=1000`);
        const data = await res.json();
        const claim = data.claims.find(c => c.id == claimId);

        if (!claim) {
            document.getElementById('claim-detail').innerHTML = '<p class="empty-state">Claim not found.</p>';
            return;
        }

        document.getElementById('claim-detail').innerHTML = `
            <div class="detail-card">
                <div class="detail-row">
                    <span class="detail-label">Claim Text</span>
                    <span class="detail-value claim-text-large">${escapeHtml(claim.claim_text)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span>${statusBadge(claim.status)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Model</span>
                    <span>${claim.model_name || '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Source URL</span>
                    <span>${claim.source_url ? `<a href="${escapeHtml(claim.source_url)}" target="_blank">${escapeHtml(claim.source_url)}</a>` : '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Notes</span>
                    <span>${claim.notes || '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Created</span>
                    <span>${new Date(claim.created_at).toLocaleString()}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Updated</span>
                    <span>${new Date(claim.updated_at).toLocaleString()}</span>
                </div>
                <div class="detail-actions">
                    <select id="detail-status" class="filter-select">
                        <option value="verified" ${claim.status === 'verified' ? 'selected' : ''}>Verified</option>
                        <option value="doubtful" ${claim.status === 'doubtful' ? 'selected' : ''}>Doubtful</option>
                        <option value="false" ${claim.status === 'false' ? 'selected' : ''}>False</option>
                        <option value="unreviewed" ${claim.status === 'unreviewed' ? 'selected' : ''}>Unreviewed</option>
                    </select>
                    <button class="btn btn-primary" onclick="updateClaimStatus()">Update Status</button>
                </div>
            </div>
        `;
    } catch (err) {
        document.getElementById('claim-detail').innerHTML = '<p class="empty-state">Error loading claim details.</p>';
    }
}

async function updateClaimStatus() {
    const newStatus = document.getElementById('detail-status').value;
    try {
        await fetch(`${API_BASE}/claims/${claimId}/status`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus }),
        });
        loadDetail();
    } catch (err) {
        alert('Error updating status.');
    }
}

loadDetail();
</script>
{% endblock %}
