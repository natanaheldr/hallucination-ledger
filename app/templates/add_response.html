{% extends "base.html" %}
{% block title %}Analyze Response{% endblock %}
{% block content %}
<div class="form-container">
    <div class="page-header">
        <h1 class="page-title">Analyze AI Response</h1>
        <p class="page-subtitle">Paste the output from any large language model and we will automatically extract verifiable factual claims</p>
    </div>

    <form id="extract-form" class="extract-form" onsubmit="handleSubmit(event)">
        <div class="form-group">
            <label for="model-name" class="form-label">AI Model</label>
            <input type="text" id="model-name" class="form-input"
                   placeholder="For example: GPT-4o, Claude 3.5 Sonnet, Gemini 1.5 Pro..."
                   required autocomplete="off">
        </div>

        <div class="form-group">
            <label for="prompt" class="form-label">Original Prompt <span class="label-optional">&mdash; optional</span></label>
            <textarea id="prompt" class="form-textarea form-textarea-sm"
                      placeholder="The instruction or question you gave to the model..."></textarea>
        </div>

        <div class="form-group">
            <label for="raw-text" class="form-label">AI Generated Response</label>
            <textarea id="raw-text" class="form-textarea"
                      placeholder="Paste the complete text response from the AI model here. The system will break it down into individual factual statements for verification..."
                      required></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
            <span id="submit-icon">&#x2699;</span>
            <span id="submit-text">Extract Claims</span>
        </button>
    </form>

    <div id="result-area" class="result-area" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h2 class="section-title" id="result-title" style="margin-bottom:0;"></h2>
            <span id="result-rate" style="font-size:0.82rem;color:var(--text-muted);"></span>
        </div>
        <div id="result-list"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const icon = document.getElementById('submit-icon');
    const text = document.getElementById('submit-text');

    btn.disabled = true;
    icon.innerHTML = '&#x21bb;';
    text.textContent = 'Extracting claims...';

    const body = {
        raw_text: document.getElementById('raw-text').value,
        model_name: document.getElementById('model-name').value.trim(),
        prompt: document.getElementById('prompt').value.trim() || null,
    };

    try {
        const res = await fetch(`${API_BASE}/claims/extract`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });

        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Extraction failed');
        }

        const data = await res.json();
        const area = document.getElementById('result-area');
        const title = document.getElementById('result-title');
        const list = document.getElementById('result-list');
        const rate = document.getElementById('result-rate');

        area.style.display = 'block';

        if (data.claims_extracted === 0) {
            title.textContent = 'No factual claims were detected';
            rate.textContent = '';
            list.innerHTML = `
                <div class="empty-state">
                    <p>The provided text does not appear to contain verifiable factual statements.</p>
                    <p style="margin-top:8px;">Try pasting a more information-dense response with dates, numbers, names, or assertions.</p>
                </div>`;
        } else {
            title.textContent = `${data.claims_extracted} claim${data.claims_extracted !== 1 ? 's' : ''} extracted`;
            rate.textContent = 'All marked as unreviewed';
            list.innerHTML = data.claims.map((c, i) =>
                `<div class="result-claim">
                    <strong style="color:var(--text-primary);">#${i + 1}</strong>
                    ${escapeHtml(c.claim_text)}
                </div>`
            ).join('');
        }

        list.innerHTML += `
            <div style="margin-top:20px;display:flex;gap:10px;">
                <a href="/" class="btn btn-primary">View in Dashboard</a>
                <button class="btn btn-secondary" onclick="resetForm()">Analyze Another</button>
            </div>
        `;

        document.getElementById('extract-form').reset();
        showToast(`${data.claims_extracted} claims extracted successfully`, 'toast-success');
    } catch (err) {
        showToast(err.message || 'Something went wrong. Please try again.', 'toast-error');
    }

    btn.disabled = false;
    icon.innerHTML = '&#x2699;';
    text.textContent = 'Extract Claims';
}

function resetForm() {
    document.getElementById('result-area').style.display = 'none';
    document.getElementById('extract-form').reset();
    document.getElementById('model-name').focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
{% endblock %}
